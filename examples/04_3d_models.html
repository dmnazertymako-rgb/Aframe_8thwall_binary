<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>04 — 3D Models</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- aframe-extras for animation-mixer component -->
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/1000055040bw-resize-640x480.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 480, "height": 640,
            "originalWidth": 480, "originalHeight": 640,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <!-- Preload 3D model asset
         Replace ../assets/sample.glb with your own GLB file -->
    <a-assets>
      <a-asset-item id="model1" src="../assets/plant_modelling.glb"></a-asset-item>
      <a-asset-item id="model2" src="../assets/satanim3.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="my-poster">

      <!-- 3D Model with animation playback
           - gltf-model: loads the GLB file
           - animation-mixer: plays all embedded animations on loop
           - Adjust scale and position to fit your model -->
      <a-entity gltf-model="#model1"
                position="-0.5  0 0"
                scale="0.1 0.1 0.1">
      </a-entity>

            <a-entity gltf-model="#model2"
                position="0.5  0 0"
                scale="0.1 0.1 0.1">
      </a-entity>

    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
